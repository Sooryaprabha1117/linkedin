<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accessible Motivation Page</title>
  <style>
    body {
      font-size: 1.2rem;
      padding: 20px;
      font-family: Arial, sans-serif;
      background-color: #f9f9ff;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1 tabindex="0">🌟 Daily Motivation</h1>
  </header>

  <main>
    <p tabindex="0" id="quote">
      "Believe you can and you're halfway there." — Theodore Roosevelt
    </p>

    <button onclick="readQuote()" aria-label="Read today's motivational quote aloud">
      🔊 Inspire Me
    </button>
  </main>

  <script>
    function readQuote() {
      const text = document.getElementById("quote").innerText;
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = "en-US";
      speech.rate = 0.5;
      window.speechSynthesis.speak(speech);
    }
  </script>
</body>
</html>
